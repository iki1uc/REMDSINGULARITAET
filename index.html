<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Cube System – Neutral Base</title>

  <style>
    /* Grundlayout – neutral */
    .cube-mask {
      display: grid;
      grid-template-columns: repeat(3, 40px);
      grid-template-rows: repeat(3, 40px);
      gap: 4px;
      margin: 20px;
    }

    .cube-mask .cell {
      border-radius: 6px;
      background: #222;
      box-shadow: 0 0 6px #000 inset;
    }

    /* RAWWAR Puls – optional */
    .rawwar-pulse .cell {
      background: #ff0000 !important;
      box-shadow: 0 0 12px #ff0000;
      transition: 0.2s;
    }
  </style>
</head>

<body>

  <div id="cube-anker">–</div>
  <div id="cube-status">–</div>

  <div id="cube1" class="cube-mask">
    <div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div>
  </div>

  <script>
    /* RAWWAR Kontakt – neutral, funktionsfähig */
    function rawwarKontakt() {
      const box = document.getElementById("cube-status");
      const anker = document.getElementById("cube-anker");

      if (!box || !anker) return;

      anker.textContent = "CUBE_1 → RAW_WAR aktiviert.";
      box.textContent = "RAW_WAR → Reaktion läuft…";

      rawwarPulse();
    }

    function rawwarPulse() {
      const cube = document.getElementById("cube1");
      if (!cube) return;

      cube.classList.add("rawwar-pulse");
      setTimeout(() => cube.classList.remove("rawwar-pulse"), 600);
    }

    /* Klick aktiviert RAWWAR */
    document.getElementById("cube1").addEventListener("click", () => {
      rawwarKontakt();
    });
  </script>

</body>
</html>
