<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>CUBI1 / RAW-NC Maske</title>
  <style>
    body {
      background:#000;
      color:#0f0;
      font-family: monospace;
      padding:20px;
    }
    #NC-OUT {
      border:1px solid #0f0;
      padding:10px;
      max-width:260px;
    }
    .label { color:#888; }
  </style>
</head>
<body>

  <!-- RAW-NC MASKE: 4 Zustände von Anfang an definiert -->
  <div id="NC-OUT">
    <span class="label">BSTAT:</span> <span id="o-bstat">0</span><br>
    <span class="label">RGRAD:</span> <span id="o-rgrad">0</span><br>
    <span class="label">HGRAD:</span> <span id="o-hgrad">0</span><br>
    <span class="label">KGRAD:</span> <span id="o-kgrad">0</span><br>
    <span class="label">R:</span> <span id="o-risk">R0</span>
  </div>

  <script>
    // RAW-NC: 4 Zustände sind von Anfang an end-definiert
    const NC = {
      BSTAT: 0,
      RGRAD: 0,
      HGRAD: 0,
      KGRAD: 0,
      R: "R0"
    };

    function ncRender() {
      document.getElementById("o-bstat").innerText = NC.BSTAT;
      document.getElementById("o-rgrad").innerText = NC.RGRAD;
      document.getElementById("o-hgrad").innerText = NC.HGRAD;
      document.getElementById("o-kgrad").innerText = NC.KGRAD;
      document.getElementById("o-risk").innerText = NC.R;
    }

    // Beispiel: Zustand setzen (hier kannst du später deine Logik andocken)
    function ncSet(bstat, rgrad, hgrad, kgrad, rlabel) {
      NC.BSTAT = bstat;
      NC.RGRAD = rgrad;
      NC.HGRAD = hgrad;
      NC.KGRAD = kgrad;
      NC.R = rlabel;
      ncRender();
    }

    // Initial: garantiert definierter Zustand
    ncRender();

    // Demo: nach 2 Sekunden einen echten Zustand einmessen
    setTimeout(() => {
      ncSet(75, 100, 50, 25, "R2");
    }, 2000);
  </script>

</body>
</html>
